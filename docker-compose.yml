version: "3.9"

services:

  # ---------------- POSTGRES ----------------
  postgres:
    image: postgres:15
    container_name: postgres
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

  # ---------------- ZOOKEEPER ----------------
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181

  # ---------------- KAFKA ----------------
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181

      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092

      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

      # 🔥 CRITICAL FIXES
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0

  # ---------------- KAFKA UI ----------------
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    depends_on:
      - kafka
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092

  # ---------------- GATEWAY ----------------
  gateway:
    build:
      context: .
      dockerfile: ./gateway/Dockerfile
    container_name: gateway
    ports:
      - "4000:4000"
    env_file:
      - ./gateway/.env
    depends_on:
      - kafka

  # ---------------- SERVICES ----------------

  user-service:
    build:
      context: .
      dockerfile: ./services/user-service/Dockerfile
    container_name: user-service
    env_file:
      - ./services/user-service/.env
    depends_on:
      - kafka
      - postgres

  profile-service:
    build:
      context: .
      dockerfile: ./services/profile-service/Dockerfile
    container_name: profile-service
    env_file:
      - ./services/profile-service/.env
    depends_on:
      - kafka
      - postgres

  availability-service:
    build:
      context: .
      dockerfile: ./services/availability-service/Dockerfile
    container_name: availability-service
    env_file:
      - ./services/availability-service/.env
    depends_on:
      - kafka
      - postgres

  matching-service:
    build:
      context: .
      dockerfile: ./services/matching-service/Dockerfile
    container_name: matching-service
    env_file:
      - ./services/matching-service/.env
    depends_on:
      - kafka
      - postgres

  session-service:
    build:
      context: .
      dockerfile: ./services/session-service/Dockerfile
    container_name: session-service
    env_file:
      - ./services/session-service/.env
    depends_on:
      - kafka
      - postgres

  notification-service:
    build:
      context: .
      dockerfile: ./services/notification-service/Dockerfile
    container_name: notification-service
    env_file:
      - ./services/notification-service/.env
    depends_on:
      - kafka
      - postgres

  messaging-service:
    build:
      context: .
      dockerfile: ./services/messaging-service/Dockerfile
    container_name: messaging-service
    ports:
      - "4007:4007"
    env_file:
      - ./services/messaging-service/.env
    depends_on:
      - kafka
      - postgres

volumes:
  postgres_data: