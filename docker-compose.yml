version: '3.8'

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 9092 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    depends_on:
      - kafka
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092

  gateway:
    build:
      context: ./gateway
    container_name: gateway
    ports:
      - "4000:4000"
    env_file: .env
    environment:
      USER_SERVICE_URL: http://user-service:4001
      PROFILE_SERVICE_URL: http://profile-service:4002
      AVAILABILITY_SERVICE_URL: http://availability-service:4003
      MATCHING_SERVICE_URL: http://matching-service:4004
      SESSION_SERVICE_URL: http://session-service:4005
      NOTIFICATION_SERVICE_URL: http://notification-service:4006
      MESSAGING_SERVICE_URL: http://messaging-service:4007
    depends_on:
      kafka:
        condition: service_healthy

  user-service:
    build:
      context: ./services/user-service
    container_name: user-service
    ports:
      - "4001:4001"
    env_file: .env
    depends_on:
      kafka:
        condition: service_healthy

  profile-service:
    build:
      context: ./services/profile-service
    container_name: profile-service
    ports:
      - "4002:4002"
    env_file: .env
    depends_on:
      kafka:
        condition: service_healthy

  availability-service:
    build:
      context: ./services/availability-service
    container_name: availability-service
    ports:
      - "4003:4003"
    env_file: .env
    depends_on:
      kafka:
        condition: service_healthy

  matching-service:
    build:
      context: ./services/matching-service
    container_name: matching-service
    ports:
      - "4004:4004"
    env_file: .env
    depends_on:
      kafka:
        condition: service_healthy

  session-service:
    build:
      context: ./services/session-service
    container_name: session-service
    ports:
      - "4005:4005"
    env_file: .env
    depends_on:
      kafka:
        condition: service_healthy

  notification-service:
    build:
      context: ./services/notification-service
    container_name: notification-service
    ports:
      - "4006:4006"
    env_file: .env
    depends_on:
      kafka:
        condition: service_healthy

  messaging-service:
    build:
      context: ./services/messaging-service
    container_name: messaging-service
    ports:
      - "4007:4007"
    env_file: .env
    depends_on:
      kafka:
        condition: service_healthy
